# SPESION 3.0 - Docker Compose Configuration
# Usage:
#   Development : docker compose up
#   Production  : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  # ==========================================================================
  # SPESION - Servicio Principal
  # ==========================================================================
  spesion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: spesion
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # LLM
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-openai}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      # Discord
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      # Notion
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_TASKS_DATABASE_ID=${NOTION_TASKS_DATABASE_ID}
      - NOTION_JOURNAL_DATABASE_ID=${NOTION_JOURNAL_DATABASE_ID}
      - NOTION_CRM_DATABASE_ID=${NOTION_CRM_DATABASE_ID}
      - NOTION_BOOKS_DATABASE_ID=${NOTION_BOOKS_DATABASE_ID}
      - NOTION_TRAININGS_DATABASE_ID=${NOTION_TRAININGS_DATABASE_ID}
      - NOTION_FINANCE_DATABASE_ID=${NOTION_FINANCE_DATABASE_ID}
      - NOTION_TRANSACTIONS_DATABASE_ID=${NOTION_TRANSACTIONS_DATABASE_ID}
      # Garmin
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      # IBKR
      - IBKR_FLEX_TOKEN=${IBKR_FLEX_TOKEN}
      - IBKR_FLEX_QUERY_ID=${IBKR_FLEX_QUERY_ID}
      # Twilio (Autonomous phone calls / SMS)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_CALLBACK_URL=${TWILIO_CALLBACK_URL}
      # SMTP (Autonomous email)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      # Autonomous engine
      - AUTONOMOUS_ENABLED=${AUTONOMOUS_ENABLED:-true}
      - AUTONOMOUS_APPROVAL_TIMEOUT_SECONDS=${AUTONOMOUS_APPROVAL_TIMEOUT_SECONDS:-300}
      - AUTONOMOUS_MAX_PLAN_STEPS=${AUTONOMOUS_MAX_PLAN_STEPS:-15}
      - AUTONOMOUS_BACKGROUND_WORKER_ENABLED=${AUTONOMOUS_BACKGROUND_WORKER_ENABLED:-true}
      # Search
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # API security
      - SPESION_API_KEY=${SPESION_API_KEY}
      - SPESION_HOST=0.0.0.0
      - SPESION_PORT=8100
      # Heartbeat
      - HEARTBEAT_ENABLED=${HEARTBEAT_ENABLED:-true}
      - HEARTBEAT_TIMEZONE=${HEARTBEAT_TIMEZONE:-Europe/Madrid}
      # Storage paths (inside container)
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - SQLITE_DB_PATH=/app/data/spesion.db
      - GOOGLE_CREDENTIALS_PATH=/app/data/google_calendar_credentials.json
    volumes:
      - spesion-data:/app/data        # Persistent: ChromaDB, SQLite, OAuth tokens
      - spesion-logs:/app/logs        # Persistent: application logs
      # Tool manifests are already copied into the image during docker build.
      # Avoid host bind mounts here for better Windows Docker Desktop support.
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - spesion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ==========================================================================
  # OLLAMA - LLM Local
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: spesion-ollama
    restart: unless-stopped
    # Only expose on localhost — never to the internet
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - spesion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  # ==========================================================================
  # SANDBOX - Ejecución Segura de Código (on-demand via Docker SDK)
  # ==========================================================================
  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    container_name: spesion-sandbox
    # Not started automatically — spawned on demand by code_sandbox tool
    profiles:
      - sandbox
    network_mode: none      # Completely isolated: no internet access
    mem_limit: 256m
    cpus: 0.5
    read_only: true
    security_opt:
      - no-new-privileges:true

# ==========================================================================
# VOLUMES
# ==========================================================================
volumes:
  spesion-data:
    driver: local
  spesion-logs:
    driver: local
  ollama-data:
    driver: local

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
  spesion-network:
    driver: bridge

